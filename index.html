let selectedQuestions = [];      // выбранные 20 случайных

let selectedOptionValue = null;  // номер выбранного ответа 1-4

const contentDiv = document.getElementById('mainContent');

function shufflePickN(arr, n) {
    const shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, n);
}

function renderQuestion() {
    const q = selectedQuestions[currentIndex];
    const saved = userAnswers[currentIndex];

    q.options.forEach((opt, idx) => {
        const optNum = idx + 1;
        const isSelected = (saved === optNum);

                <div class="option-prefix">${optNum}</div>
                <div>${opt}</div>
            </div>
        `;
    });
    const html = `
        <div class="progress">
            <span class="question-counter">Вопрос ${currentIndex+1} из ${selectedQuestions.length}</span>
            <span class="score-badge" id="scorePreview">✅ Правильных: ${userAnswers.filter((a,i)=> a === selectedQuestions[i]?.answer).length}</span>
        </div>
        <div class="question-text">${q.question}</div>
        <div class="options-area" id="optionsArea">
            ${optionsHtml}
        </div>
        <div class="button-group">
            <button id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>← Назад</button>
            <button id="nextBtn" class="btn-primary">${currentIndex === selectedQuestions.length-1 ? 'Завершить' : 'Далее →'}</button>
            <button id="restartBtn" class="btn-outline">🔄 Новый тест</button>
        </div>
    `;
    contentDiv.innerHTML = html;
    
    // подсветка выбранного
    document.querySelectorAll('.option').forEach(el => {
        const val = parseInt(el.dataset.opt);
        if (saved === val) el.classList.add('selected');
        el.addEventListener('click', () => {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedOptionValue = val;
            // Сохраняем сразу при клике
            userAnswers[currentIndex] = selectedOptionValue;
            updateScorePreview();
        });
    });
    
    document.getElementById('prevBtn')?.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    });
    document.getElementById('nextBtn')?.addEventListener('click', () => {
        // если нет выбранного ответа – предупреждение
        if (userAnswers[currentIndex] === null) {
            alert('Пожалуйста, выберите вариант ответа.');

        }
        if (currentIndex === selectedQuestions.length - 1) {
            showResults();
        } else {
            currentIndex++;
            renderQuestion();
        }
    });
    document.getElementById('restartBtn')?.addEventListener('click', () => {
        startNewTest();
    });
}

function updateScorePreview() {
    const correctNow = userAnswers.filter((a,i)=> a === selectedQuestions[i]?.answer).length;
    const previewSpan = document.getElementById('scorePreview');
    if (previewSpan) previewSpan.innerText = `✅ Правильных: ${correctNow}`;
}

function showResults() {
    let correctCount = 0;
    let detailsHtml = '';
    for (let i = 0; i < selectedQuestions.length; i++) {
        const q = selectedQuestions[i];
        const user = userAnswers[i];
        const isCorrect = (user === q.answer);
        if (isCorrect) correctCount++;
        const userText = user ? q.options[user-1] : 'Нет ответа';
        const correctText = q.options[q.answer-1];
        detailsHtml += `<div style="margin-bottom: 8px; padding: 6px; border-bottom: 1px solid #e2e8f0;">
            <b>Вопрос ${i+1}:</b> ${q.question}<br>
            📌 Ваш ответ: ${userText}<br>
            ✅ Правильный: ${correctText}<br>
            ${isCorrect ? '🟢 Верно' : '🔴 Неверно'}
        </div>`;
    }
    const percent = (correctCount / selectedQuestions.length * 100).toFixed(1);
    contentDiv.innerHTML = `
        <div class="result-area">
            <div class="result-stats">🏆 Результат: ${correctCount} из ${selectedQuestions.length} (${percent}%)</div>
            <div style="font-size:1.2rem; margin:10px 0;">${percent >= 70 ? 'Поздравляем!' : 'Попробуйте ещё раз'}</div>
            <button id="newTestFromResult" class="btn-success">🔁 Пройти новый тест</button>
            <div class="result-details">${detailsHtml}</div>
        </div>
    `;
    document.getElementById('newTestFromResult')?.addEventListener('click', () => startNewTest());
}

function startNewTest() {
    selectedQuestions = shufflePickN(allQuestions, 20);
    currentIndex = 0;
    userAnswers = new Array(20).fill(null);
    selectedOptionValue = null;
    renderQuestion();
}

// Инициализация
startNewTest();
</script>
</body>
</html>
